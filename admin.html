<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Training Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
    <header>
        <div class="header-container">
            <div class="logo">🔐 Admin Panel</div>
            <nav class="nav-buttons">
                <button class="btn btn-outline" onclick="window.location.href='index.html'">View Posts</button>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </nav>
        </div>
    </header>

    <div class="container">
        <!-- Login Section -->
        <section class="login-section" id="loginSection">
            <div class="login-box">
                <h2>Admin Login</h2>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <p id="loginError" style="color: red; margin-top: 1rem;"></p>
            </div>
        </section>

        <!-- Admin Dashboard -->
        <section class="admin-dashboard" id="adminDashboard" style="display: none;">
            <div class="dashboard-header">
                <h1>Dashboard</h1>
                <p>Total Posts: <span id="totalPosts">0</span></p>
            </div>

            <!-- Add Post Form -->
            <section class="form-section">
                <h2>Add New Training Material</h2>
                <form id="postForm" onsubmit="handleAddPost(event)">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="postTitle" placeholder="Enter title" required>
                    </div>

                    <div class="form-group">
                        <label>Description *</label>
                        <textarea id="postDescription" placeholder="Enter description" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Link/URL *</label>
                        <input type="url" id="postLink" placeholder="https://example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Primary Category *</label>
                        <select id="postCategory" required>
                            <option value="">Select Category</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Mobile Development">Mobile Development</option>
                            <option value="Data Science">Data Science</option>
                            <option value="AI/ML">AI/ML</option>
                            <option value="Cloud">Cloud</option>
                            <option value="DevOps">DevOps</option>
                            <option value="Security">Security</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tags (comma separated) *</label>
                        <input type="text" id="postTags" placeholder="e.g., JavaScript, React, Tutorial" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Post Material</button>
                </form>
            </section>

            <!-- Posts List -->
            <section class="posts-list-section">
                <h2>Posted Materials</h2>
                <div id="adminPostsList" class="admin-posts-list"></div>
            </section>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        const ADMIN_PASSWORD = 'admin123'; // Change this!

        function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showAdminDashboard();
                loadAdminPosts();
            } else {
                document.getElementById('loginError').textContent = 'Invalid password';
            }
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function showAdminDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        }

        function handleAddPost(e) {
            e.preventDefault();
            
            const post = {
                title: document.getElementById('postTitle').value,
                description: document.getElementById('postDescription').value,
                link: document.getElementById('postLink').value,
                category: document.getElementById('postCategory').value,
                tags: document.getElementById('postTags').value.split(',').map(t => t.trim()),
                createdAt: new Date().toISOString()
            };

            addPost(post);
        }

        function loadAdminPosts() {
            fetch('/api/posts')
                .then(r => r.json())
                .then(posts => {
                    document.getElementById('totalPosts').textContent = posts.length;
                    renderAdminPosts(posts);
                });
        }

        function renderAdminPosts(posts) {
            const list = document.getElementById('adminPostsList');
            if (posts.length === 0) {
                list.innerHTML = '<p>No posts yet</p>';
                return;
            }
            
            list.innerHTML = posts.map(post => `
                <div class="admin-post-item">
                    <h3>${post.title}</h3>
                    <p>${post.description}</p>
                    <p><strong>Link:</strong> <a href="${post.link}" target="_blank">${post.link}</a></p>
                    <p><strong>Category:</strong> ${post.category}</p>
                    <p><strong>Tags:</strong> ${post.tags.join(', ')}</p>
                    <button class="btn btn-danger" onclick="deletePost('${post._id}')">Delete</button>
                </div>
            `).join('');
        }

        // Check if already logged in
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showAdminDashboard();
            loadAdminPosts();
        }
    </script>
</body>
</html>
